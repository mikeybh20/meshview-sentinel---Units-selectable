services:
  meshview:
    build: .
    # --- networking ---
    # Default: bridge networking + port-mapping (below). mDNS / Bonjour
    # multicast does NOT traverse Docker bridges, so Settings → Add Radio's
    # "Discovered on WiFi" list will stay empty under this default mode.
    # Manual IP entry + Detect Identity still work fine.
    #
    # To enable mDNS auto-discovery of Meshtastic radios on your LAN:
    #   1. Comment out the `ports:` block below
    #   2. Uncomment `network_mode: host`
    #   3. Change MESHVIEW_GPU_URL from `http://meshview-gpu:7100`
    #      to `http://localhost:7100` (host networking bypasses the
    #      compose-internal service-name DNS)
    #   4. Dashboard URL changes from http://<host>:3000 → http://<host>:3001
    #
    # network_mode: host
    ports:
      # Host port 3000 → container port 3001 (the API server's listen port).
      # We deliberately keep this on a high port: port 80 binding succeeds at
      # the Docker daemon level but the host's iptables FORWARD chain on some
      # systems silently drops external traffic to privileged ports, leading
      # to a "hangs forever" symptom that's hard to diagnose. Operators who
      # want port-less URLs (http://<host>/) can run a reverse proxy in
      # front (Caddy, nginx) and forward to localhost:3000.
      - "3000:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SERIAL_AUTO_DISCOVER=true
      # v2.0: GPU sidecar URL. Default is the compose-network service name.
      # Override (e.g., MESHVIEW_GPU_URL=http://192.168.1.50:7100) to point at
      # a remote sidecar — useful when the Sentinel host has no GPU but a
      # nearby NVIDIA box does.
      - MESHVIEW_GPU_URL=http://meshview-gpu:7100
      # v2.0 Beta 4: container timezone. Passes through TZ from the host's
      # docker-compose shell (e.g., `TZ=America/New_York docker compose up`);
      # falls back to the IANA zone after the colon if the host doesn't set
      # one. Adjust the fallback for your region. Without this, the container
      # runs UTC and the BBS daily-forecast scheduler fires at HH:MM-UTC
      # instead of the operator's local time. Common zones:
      # America/New_York | America/Chicago | America/Denver | America/Los_Angeles
      # Europe/London | Europe/Berlin | Asia/Tokyo | Australia/Sydney
      - TZ=${TZ:-America/New_York}
    # `host.docker.internal` works on Docker Desktop (mac/windows) out of the
    # box, but on Linux you have to alias it to the host gateway explicitly.
    # This lets the in-container API reach a host-side Ollama at
    # http://host.docker.internal:11434 (the default Ollama port).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # --- Dynamic USB access ---
    # Mount /dev so the container sees devices as they appear/disappear.
    # cgroup rules grant access to USB serial devices (major 188 = ttyUSB, 166 = ttyACM)
    # without needing --privileged.
    volumes:
      - /dev:/dev
      - /sys:/sys:ro
      - /run/udev:/run/udev:ro
      - meshview-data:/app/data
    device_cgroup_rules:
      - "c 188:* rmw"   # /dev/ttyUSB*
      - "c 166:* rmw"   # /dev/ttyACM*
    restart: unless-stopped
    # Cap the json-file log driver so stdout doesn't fill the host disk over
    # long runs (Sentinel logs every packet at debug level — useful diagnostics
    # but unbounded by default). 5 × 10MB = 50MB ceiling per container.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      - meshview-gpu

  # ---------------------------------------------------------------------
  # v2.0 GPU sidecar — Python service hosting GPU-accelerated workloads.
  # Phase 1.5 ships endpoint stubs only (501); Sentinel uses CPU fallbacks
  # transparently. Phases 3/4/5 implement actual GPU paths.
  #
  # To use a GPU here, ensure the host has the NVIDIA Container Toolkit
  # installed, and uncomment the `deploy.resources.reservations.devices`
  # block below. Without it, the sidecar runs in CPU-stub mode (still
  # responds to /health, all compute endpoints return 501).
  # ---------------------------------------------------------------------
  meshview-gpu:
    build:
      context: ./gpu
      dockerfile: Dockerfile
    environment:
      - MESHVIEW_GPU_PORT=7100
      - MESHVIEW_GPU_LOG_LEVEL=INFO
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Uncomment for NVIDIA GPU passthrough (requires nvidia-container-toolkit
    # on the host). On Jetson this is already implicit when the L4T runtime
    # is the default Docker runtime.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

volumes:
  meshview-data:
