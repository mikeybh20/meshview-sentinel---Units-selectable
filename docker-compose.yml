services:
  meshview:
    build: .
    ports:
      # Host port 3000 → container port 3001 (the API server's listen port).
      # We deliberately keep this on a high port: port 80 binding succeeds at
      # the Docker daemon level but the host's iptables FORWARD chain on some
      # systems silently drops external traffic to privileged ports, leading
      # to a "hangs forever" symptom that's hard to diagnose. Operators who
      # want port-less URLs (http://<host>/) can run a reverse proxy in
      # front (Caddy, nginx) and forward to localhost:3000.
      - "3000:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SERIAL_AUTO_DISCOVER=true
    # `host.docker.internal` works on Docker Desktop (mac/windows) out of the
    # box, but on Linux you have to alias it to the host gateway explicitly.
    # This lets the in-container API reach a host-side Ollama at
    # http://host.docker.internal:11434 (the default Ollama port).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # --- Dynamic USB access ---
    # Mount /dev so the container sees devices as they appear/disappear.
    # cgroup rules grant access to USB serial devices (major 188 = ttyUSB, 166 = ttyACM)
    # without needing --privileged.
    volumes:
      - /dev:/dev
      - /sys:/sys:ro
      - /run/udev:/run/udev:ro
      - meshview-data:/app/data
    device_cgroup_rules:
      - "c 188:* rmw"   # /dev/ttyUSB*
      - "c 166:* rmw"   # /dev/ttyACM*
    restart: unless-stopped
    # Cap the json-file log driver so stdout doesn't fill the host disk over
    # long runs (Sentinel logs every packet at debug level — useful diagnostics
    # but unbounded by default). 5 × 10MB = 50MB ceiling per container.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  meshview-data:
