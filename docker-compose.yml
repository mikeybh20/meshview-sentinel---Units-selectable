services:
  meshview:
    build: .
    ports:
      - "3000:3001"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SERIAL_AUTO_DISCOVER=true
    # `host.docker.internal` works on Docker Desktop (mac/windows) out of the
    # box, but on Linux you have to alias it to the host gateway explicitly.
    # This lets the in-container API reach a host-side Ollama at
    # http://host.docker.internal:11434 (the default Ollama port).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # --- Dynamic USB access ---
    # Mount /dev so the container sees devices as they appear/disappear.
    # cgroup rules grant access to USB serial devices (major 188 = ttyUSB, 166 = ttyACM)
    # without needing --privileged.
    volumes:
      - /dev:/dev
      - /sys:/sys:ro
      - /run/udev:/run/udev:ro
      - meshview-data:/app/data
    device_cgroup_rules:
      - "c 188:* rmw"   # /dev/ttyUSB*
      - "c 166:* rmw"   # /dev/ttyACM*
    restart: unless-stopped

volumes:
  meshview-data:
